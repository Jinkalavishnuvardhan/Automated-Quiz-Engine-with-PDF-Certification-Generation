<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard - Quiz</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            color: #fff;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
            background: white;
            color: black;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        button {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .deleteBtn {
            background: red;
            color: white;
        }

        .editBtn {
            background: orange;
            color: white;
        }

        .updateBtn {
            background: green;
            color: white;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        .top-controls {
            margin: 20px;
        }

        .clearBtn {
            background: black;
            color: white;
            padding: 10px;
        }
    </style>

</head>

<body>

    <h1>Admin Dashboard - Quiz Leaderboard</h1>

    <div class="top-controls">

        <input type="text" id="name" placeholder="Name">
        <input type="number" id="score" placeholder="Score">
        <input type="number" id="total" placeholder="Total">

        <button onclick="addRecord()">Add Record</button>
        <button class="clearBtn" onclick="clearAll()">Clear All Data</button>

    </div>

    <div class="container">

        <table>

            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>VTU</th>
                    <th>Score</th>
                    <th>%</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="leaderboard"></tbody>

        </table>

    </div>

    <script>

        function loadLeaderboard() {
            const data = JSON.parse(localStorage.getItem("quizData")) || [];
            data.sort((a, b) => b.score - a.score);

            if (data.length === 0) {
                document.getElementById("leaderboard").innerHTML = "<tr><td colspan='6'>No exam submissions yet.</td></tr>";
                return;
            }

            let table = "";
            data.forEach((item, index) => {
                table += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.name || "-"}</td>
                        <td>${item.vtu || "-"}</td>
                        <td>${item.score}/${item.total}</td>
                        <td>${item.percentage}%</td>
                        <td>${item.status || "completed"}</td>
                        <td>${item.date}</td>
                        <td>
                            <button class="deleteBtn" onclick="deleteRecord(${index})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("leaderboard").innerHTML = table;
        }

        function deleteRecord(index) {
            const data = JSON.parse(localStorage.getItem("quizData")) || [];
            data.splice(index, 1);
            localStorage.setItem("quizData", JSON.stringify(data));
            loadLeaderboard();
        }

        function clearAll() {
            if (confirm("Delete ALL records?")) {
                localStorage.removeItem("quizData");
                loadLeaderboard();
            }
        }

        window.addRecord = function () {
            const name = document.getElementById("name").value.trim();
            const score = Number(document.getElementById("score").value);
            const total = Number(document.getElementById("total").value);

            if (!name || Number.isNaN(score) || Number.isNaN(total) || total <= 0) {
                alert("Fill all fields correctly.");
                return;
            }

            const percentage = ((score / total) * 100).toFixed(1);
            const data = JSON.parse(localStorage.getItem("quizData")) || [];

            data.push({
                name,
                score,
                total,
                percentage,
                date: new Date().toLocaleString()
            });

            localStorage.setItem("quizData", JSON.stringify(data));
            document.getElementById("name").value = "";
            document.getElementById("score").value = "";
            document.getElementById("total").value = "";
            loadLeaderboard();
        };

        window.deleteRecord = deleteRecord;
        window.clearAll = clearAll;

        window.addEventListener("storage", function (event) {
            if (event.key === "quizData") {
                loadLeaderboard();
            }
        });

        loadLeaderboard();

    </script>

</body>

</html>
